services:
  - type: web
    name: api-services-mvp
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
        fromService:
          type: web
          name: api-services-mvp
          property: port

